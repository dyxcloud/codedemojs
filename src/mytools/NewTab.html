<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #202124;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        #search-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #dcdcdc;
            border-radius: 24px 0 0 24px;
            font-size: 16px;
            background: #ffffff;
            color: #202124;
        }

        #search-button {
            padding: 12px 20px;
            background: #4285f4;
            border: none;
            border-radius: 0 24px 24px 0;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .site-option {
            margin-bottom: 30px;
        }

        #site-select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #dcdcdc;
            border-radius: 24px;
            font-size: 14px;
            background: #ffffff;
            color: #202124;
        }

        .instructions {
            background: #ffffff;
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
            color: #5f6368;
            border: 1px solid #e8eaed;
        }

        .instructions h3 {
            color: #202124;
            margin-bottom: 10px;
        }

        .instructions ul {
            list-style-position: inside;
            line-height: 1.6;
        }

        .bookmark-btn {
            position: fixed;
            top: 10px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #dcdcdc;
            border-radius: 20px;
            color: #5f6368;
            font-size: 13px;
            display: inline-block;
            pointer-events: none;
        }

        .bookmark-btn kbd {
            background: #f1f3f4;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            #search-input, #search-button {
                padding: 10px 12px;
                font-size: 14px;
            }

            #site-select {
                padding: 8px 12px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #202124;
            }

            h1 {
                color: white;
            }

            #search-input {
                background: #303134;
                color: white;
                border-color: #5f6368;
            }

            #site-select {
                background: #303134;
                color: white;
                border-color: #5f6368;
            }

            .instructions {
                background: rgba(255, 255, 255, 0.1);
                color: #e8eaed;
                border-color: #5f6368;
            }

            .instructions h3 {
                color: white;
            }

            .bookmark-btn {
                background: rgba(95, 99, 104, 0.8);
                border-color: #5f6368;
                color: #9aa0a6;
            }

            .bookmark-btn kbd {
                background: #303134;
            }
        }
    </style>
</head>
<body>
<div class="bookmark-btn">书签管理 <kbd>Ctrl+Shift+O</kbd></div>

<div class="container">
    <h1>快速搜索</h1>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="输入搜索内容">
        <button id="search-button">Google</button>
    </div>

    <div class="site-option">
        <select id="site-select">
            <option value="">无</option>
            <option value="v2ex.com">v2ex.com</option>
            <option value="zhihu.com">zhihu.com</option>
        </select>
    </div>

    <div class="instructions">
        <h3>搜索说明：</h3>
        <ul>
            <li><strong>普通搜索</strong>：输入关键词，选择"无"</li>
            <li><strong>指定网站搜索</strong>：输入关键词，选择网站</li>
            <li><strong>按 Enter 键</strong> 或点击按钮开始搜索</li>
        </ul>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const searchButton = document.getElementById('search-button');
    const siteSelect = document.getElementById('site-select');

    function performSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        const site = siteSelect.value.trim();
        const searchUrl = site
            ? `https://www.google.com/search?q=site:${encodeURIComponent(site)}+${encodeURIComponent(query)}`
            : `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        window.location.href = searchUrl;
    }

    searchButton.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') performSearch();
    });
</script>
</body>
</html>
