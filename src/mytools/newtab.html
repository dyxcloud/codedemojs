<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #202124;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: transparent;
            border-radius: 16px;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .search-container {
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        #search-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #5f6368;
            border-radius: 24px 0 0 24px;
            font-size: 16px;
            box-shadow: none;
            transition: all 0.3s ease;
            background: #303134;
            color: white;
        }

        #search-input:focus {
            outline: none;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            border-color: rgba(223, 225, 229, 0);
        }

        #search-input::placeholder {
            color: #9aa0a6;
        }

        #search-button {
            padding: 12px 20px;
            background: #4285f4;
            border: none;
            border-radius: 0 24px 24px 0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #search-button:hover {
            background: #3367d6;
        }

        .site-option {
            margin-bottom: 30px;
        }

        #site-select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #5f6368;
            border-radius: 24px;
            font-size: 14px;
            box-shadow: none;
            transition: all 0.3s ease;
            background: #303134;
            color: white;
        }

        #site-select:focus {
            outline: none;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            border-color: rgba(223, 225, 229, 0);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
            color: #e8eaed;
        }

        .instructions h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .instructions ul {
            list-style-position: inside;
            line-height: 1.6;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            #search-input {
                padding: 10px 12px;
                font-size: 14px;
            }

            #search-button {
                padding: 10px 16px;
            }

            #site-select {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>快速搜索</h1>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="输入搜索内容">
        <button id="search-button" title="搜索">Google</button>
    </div>

    <div class="site-option">
        <select id="site-select">
            <option value="">无</option>
            <option value="v2ex.com">v2ex.com</option>
            <option value="zhihu.com">zhihu.com</option>
            <!-- 后续可以在这里添加更多网站选项 -->
            <!-- <option value="example.com">example.com</option> -->
        </select>
    </div>

    <div class="instructions">
        <h3>搜索说明：</h3>
        <ul>
            <li><strong>普通搜索</strong>：在搜索框中输入关键词，选择"无"</li>
            <li><strong>指定网站搜索</strong>：在搜索框中输入关键词，选择要搜索的网站</li>
            <li><strong>按 Enter 键</strong> 或点击Google按钮开始搜索</li>
        </ul>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const siteSelect = document.getElementById('site-select');

        // 搜索函数
        function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            let searchUrl = '';
            const site = siteSelect.value.trim();

            if (site) {
                // 指定网站搜索
                searchUrl = `https://www.google.com/search?q=site:${encodeURIComponent(site)}+${encodeURIComponent(query)}`;
            } else {
                // 普通搜索
                searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }

            // 打开搜索结果
            window.location.href = searchUrl;
        }

        // 点击搜索按钮
        searchButton.addEventListener('click', performSearch);

        // 按Enter键搜索
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    });
</script>
</body>
</html>
